<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Book Explorer</title>
 
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="relative min-h-screen text-white overflow-x-hidden">
    <!-- LIBRARY BACKGROUND -->
<div
  class="fixed inset-0 bg-cover bg-center -z-10"
  style="
    background-image:
    linear-gradient(
      rgba(0,0,0,0.75),
      rgba(0,0,0,0.75)
    ),
    url('https://images.unsplash.com/photo-1507842217343-583bb7270b66');
  "
></div>
    <main class="relative z-10"></main>
    

  <!-- NAVBAR -->
  <nav class="bg-slate-900 text-white p-5 flex justify-between items-center">

    <h1 class="text-3xl font-bold">
      📚 Book Explorer
    </h1>

    <div class="space-x-6">

  <a href="index.html">
    Home
  </a>

  <a href="favorites.html">
    Favorites
  </a>

  <a href="about.html">
    About
  </a>

</div>
      

  </nav>


  <!-- HERO -->
  <section class="relative overflow-hidden bg-gradient-to-r from-purple-900 via-purple-800 to-beige-700 text-black text-center py-24 px-6">
    <!-- Blur Background -->
<div class="absolute top-10 left-10 w-72 h-72 bg-violet-500 opacity-30 rounded-full blur-3xl"></div>

<div class="absolute bottom-10 right-10 w-72 h-72 bg-beige-500 opacity-30 rounded-full blur-3xl"></div>
<div class="relative z-10"></div>
    <h2 class="text-5xl font-bold mb-6">
      Discover 
      The World's Greatest Books
    </h2>

    <p class="text-xl mb-8">
      Search and save your favorite books
    </p>

    <div class="max-w-2xl mx-auto flex gap-4">

      <input
        id="searchInput"
        type="text"
        placeholder="Search books..."
        class="flex-1 p-4 rounded-xl text-black"
      />

      <button
        id="searchBtn"
        class="bg-orange-600 text-white px-6 py-4 rounded-xl"
      >
        Search
      </button>

    </div>

  </section>


  <!-- BOOKS -->
  <section class="p-10">

    <h2 class="text-3xl font-bold mb-8">
      Prominent Books
    </h2>

    <div
      id="booksContainer"
    class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-10"
    >

    </div>


    <!-- LOAD MORE -->
    <div class="text-center mt-10">

      <button
        id="loadMoreBtn"
        class="bg-orange-600 text-white px-8 py-4 rounded-xl"
      >
        Load More
      </button>

    </div>

  </section>


  <!-- FOOTER -->
  <footer class="bg-slate-900 text-white text-center p-6 mt-10">

    <p>
      © 2026 Book Explorer
    </p>

  </footer>

  <script type="module" src="js/main.js"></script>
</main>
</body>
</html>
