<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Book Explorer</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100">

  <!-- NAVBAR -->
  <nav class="bg-slate-900 text-white p-5 flex justify-between items-center">

    <h1 class="text-3xl font-bold">
      📚 Book Explorer
    </h1>

    <div class="space-x-6">

  <a href="index.html">
    Home
  </a>

  <a href="favorites.html">
    Favorites
  </a>

  <a href="about.html">
    About
  </a>

</div>
      

  </nav>


  <!-- HERO -->
  <section class="bg-gradient-to-r from-indigo-700 to-purple-700 text-white text-center py-20 px-6">

    <h2 class="text-5xl font-bold mb-6">
      Discover Amazing Books
    </h2>

    <p class="text-xl mb-8">
      Search and save your favorite books
    </p>

    <div class="max-w-2xl mx-auto flex gap-4">

      <input
        id="searchInput"
        type="text"
        placeholder="Search books..."
        class="flex-1 p-4 rounded-xl text-black"
      />

      <button
        id="searchBtn"
        class="bg-black px-6 py-4 rounded-xl"
      >
        Search
      </button>

    </div>

  </section>


  <!-- BOOKS -->
  <section class="p-10">

    <h2 class="text-3xl font-bold mb-8">
      Popular Books
    </h2>

    <div
      id="booksContainer"
      class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"
    >

    </div>


    <!-- LOAD MORE -->
    <div class="text-center mt-10">

      <button
        id="loadMoreBtn"
        class="bg-indigo-600 text-white px-8 py-4 rounded-xl"
      >
        Load More
      </button>

    </div>

  </section>


  <!-- FOOTER -->
  <footer class="bg-slate-900 text-white text-center p-6 mt-10">

    <p>
      © 2026 Book Explorer
    </p>

  </footer>

  <script type="module" src="js/main.js"></script>

</body>
</html>
